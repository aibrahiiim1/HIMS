name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: test
        run: go test ./...
        # Integration tests (real Postgres) are gated behind -tags=integration
        # and run separately; the default suite is DB-free.

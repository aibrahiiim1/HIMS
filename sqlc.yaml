version: "2"
sql:
  - engine: postgresql
    queries: internal/storage/postgres/queries
    schema: migrations
    gen:
      go:
        package: db
        out: internal/storage/postgres/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # google/uuid over pgtype.UUID — the app speaks uuid.UUID.
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # netip.Addr is the modern, value-typed inet; pgx/v5 encodes it.
          - db_type: "inet"
            go_type:
              import: "net/netip"
              type: "Addr"
          - db_type: "inet"
            nullable: true
            go_type:
              import: "net/netip"
              type: "Addr"
              pointer: true
          # cidr for subnet scopes.
          - db_type: "cidr"
            go_type:
              import: "net/netip"
              type: "Prefix"
          - db_type: "cidr"
            nullable: true
            go_type:
              import: "net/netip"
              type: "Prefix"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
